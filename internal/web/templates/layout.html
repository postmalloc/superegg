{{define "shell_header"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand"><a href="/">superegg</a></div>
      <nav class="topnav">
        <a href="/" class="{{if isActive .CurrentTab "feed"}}active{{end}}">Feed</a>
        <a href="/search" class="{{if isActive .CurrentTab "search"}}active{{end}}">Search</a>
        <a href="/about" class="{{if isActive .CurrentTab "about"}}active{{end}}">About</a>
        <a href="/settings" class="{{if isActive .CurrentTab "settings"}}active{{end}}">Settings</a>
      </nav>
    </div>
    <div class="topbar-actions">
      <form action="/refresh" method="post">
        <button type="submit" class="icon-button" title="Refresh all stories" aria-label="Refresh all stories">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 0-9-9" />
            <path d="M21 3v6h-6" />
            <path d="M3 12a9 9 0 0 0 9 9" />
            <path d="M3 21v-6h6" />
          </svg>
          <span class="sr-only">Refresh all stories</span>
        </button>
      </form>
      <form action="/logout" method="post">
        <button type="submit" class="icon-button" title="Log out" aria-label="Log out">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 21h-3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span class="sr-only">Log out</span>
        </button>
      </form>
    </div>
  </header>
  <main class="page">
{{end}}

{{define "shell_footer"}}
  </main>
</body>
</html>
{{end}}
